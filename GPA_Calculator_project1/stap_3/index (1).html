<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA_Calculator_project1 - Step 3</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="mb-4">GPA Calculator (Step 3)</h2>

    <!-- نتيجة AJAX -->
    <div id="result"></div>

    <!-- الفورم -->
    <form id="gpaForm">

        <!-- اسم الطالب -->
        <div class="mb-3">
            <label>Student Name</label>
            <input type="text" name="student" class="form-control" required>
        </div>

        <!-- جدول المواد -->
        <table class="table table-bordered" id="table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Credits</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" name="course[]" class="form-control" required></td>
                    <td><input type="number" name="credits[]" class="form-control" required></td>
                    <td>
                        <select name="grade[]" class="form-control">
                            <option>A</option>
                            <option>B</option>
                            <option>C</option>
                            <option>D</option>
                            <option>F</option>
                        </select>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- زر إضافة مادة -->
        <button type="button" id="addRow" class="btn btn-secondary">+ Add Course</button>

        <!-- زر الحساب -->
        <button type="submit" class="btn btn-success">Calculate GPA</button>
    </form>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- ملف JS -->
    <script src="script.js"></script>

</body>
</html>
